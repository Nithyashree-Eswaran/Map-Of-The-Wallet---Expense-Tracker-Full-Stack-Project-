
spring.data.mongodb.uri=mongodb://localhost:27017/expensetracker
spring.data.mongodb.database=expensetracker

# App Properties
expensetracker.app.jwtSecret=expenseTrackerSecretKey2025
expensetracker.app.jwtExpirationMs=86400000

# Server port
server.port=8080

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.expensetracker=DEBUG

# CORS Configuration
spring.mvc.cors.allowed-origins=*
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allow-credentials=true
